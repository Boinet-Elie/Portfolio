    <main>
        <!-- Section Contact -->
        <section id="contact">
            <h2>Contact</h2>
            <p>Vous avez un projet en tête ou une question ? N'hésitez pas à me contacter !</p>
            <form class="contact-form" action="https://formspree.io/f/movjgoqp" method="POST">
                <div class="form-group">
                    <label for="name">Nom complet</label>
                    <input type="text" id="name" name="name" placeholder="Votre nom" required>
                </div>
                <div class="form-group">
                    <label for="email">Adresse email</label>
                    <input type="email" id="email" name="email" placeholder="Votre email" required>
                </div>
                <div class="form-group">
                    <label for="subject">Sujet</label>
                    <input type="text" id="subject" name="subject" placeholder="Objet de votre message" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Votre message" rows="5" required></textarea>
                </div>
                <button type="submit">Envoyer</button>
            </form>
        </section>
    </main>
