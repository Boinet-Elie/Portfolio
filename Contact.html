<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Style.css">
    <script src="Script.js" defer></script>
    <link rel="icon" type="image/x-icon" href="Asset/img/favicon.ico">
</head>
<body>
    <div class="terminal-effect"></div>
    
    <header class="glass-header">
        <nav>
            <div class="logo">
                <span class="code-symbol">{</span>ÉB<span class="code-symbol">}</span>
            </div>
            <button id="hamburger-menu" aria-label="Ouvrir le menu de navigation" aria-expanded="false" aria-controls="nav-links">
                <i class="fas fa-bars" aria-hidden="true"></i>
            </button>
            <ul id="nav-links">
                <li><a href="Index.html" class="nav-link"> Acceuil</a></li>
                <li><a href="Project.html" class="nav-link"> Projets</a></li>
                <li><a href="Tableau_Synthese .html" class="nav-link"> Tableau de synthèse</a></li>
                <li><a href="Veille.html" class="nav-link"> Veille</a></li>
                <li><a href="Contact.html" class="nav-link"> Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>      
        <!-- Section Contact -->
        <section id="contact" class="section dark-section">
            <div class="section-header">
                <h2 class="section-title"> Contact</h2>
                <div class="section-divider"></div>
            </div>
            <div class="contact-content">
                <div class="contact-info">
                    <h3>Prenons contact</h3>
                    <p>N'hésitez pas à me contacter pour toute opportunité ou collaboration.</p>
                    <div class="contact-details">
                        <div class="contact-item">
                            <i class="fas fa-envelope"></i>
                            <span>boinet.professionel@gmail.com</span>
                        </div>
                        <div class="contact-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>Chambéry, France</span>
                        </div>
                    </div>
                </div>
                <form class="contact-form" action="https://formspree.io/f/mnjgpjgv" data-netlify="true" method="POST">
                    <div class="form-group">
                        <label for="name">Nom</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">Sujet</label>
                        <input type="text" id="subject" name="subject" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="cta-button">Envoyer le message</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="glass-footer">
        <div class="footer-content">
            <a href="Index.html" class="footer-logo" aria-label="Accueil - Élie Boinet">
                <span class="code-symbol" aria-hidden="true">{</span>ÉB<span class="code-symbol" aria-hidden="true">}</span>
            </a>
            <div class="footer-bottom">
                <p>Conçu et développé par Élie Boinet</p>
                <p>&copy; 2025 Tous droits réservés</p>
            </div>
            <nav class="footer-social" aria-label="Liens vers les réseaux sociaux">
                <a href="https://www.linkedin.com/in/elie-boinet-0852543545345335353435453454534/" target="_blank" rel="noopener noreferrer" aria-label="Profil LinkedIn d'Élie Boinet (s'ouvre dans un nouvel onglet)">
                    <i class="fab fa-linkedin-in" aria-hidden="true"></i>
                </a>
                <a href="https://github.com/Boinet-Elie" target="_blank" rel="noopener noreferrer" aria-label="Profil GitHub d'Élie Boinet (s'ouvre dans un nouvel onglet)">
                    <i class="fab fa-github" aria-hidden="true"></i>
                </a>
            </nav>
        </div>
    </footer>
</body>
</html>
